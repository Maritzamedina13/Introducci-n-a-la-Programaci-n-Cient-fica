<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Quizzes de repaso del Máster en Bioinformática: elige una materia y practica con preguntas aleatorias en modo Estudiar o Evaluar para preparar el examen final.">
<title>Quiz BIOINF — Módulos</title>
<link rel="stylesheet" href="assets/quiz.css">
</head>
<body>

<canvas id="helix"></canvas>

<div class="wrap">
  <header class="top">
    <span class="eyebrow">BIOINF · Máster en Bioinformática</span>
    <h1>Quiz de repaso</h1>
    <p class="sub">Elige una materia para practicar. Cada quiz sortea preguntas al azar del banco de esa materia, con dos modos: Estudiar (revisión instantánea) y Evaluar (nota final).</p>
  </header>

  <div class="module-grid" id="module-grid"></div>
</div>

<script src="materias/registry.js"></script>
<script>
(function(){
  "use strict";
  var grid = document.getElementById("module-grid");
  var modules = window.QUIZ_REGISTRY || [];

  if(modules.length === 0){
    grid.innerHTML = '<div class="card empty-note">Todavía no hay materias registradas en materias/registry.js.</div>';
    return;
  }

  modules.forEach(function(m){
    var a = document.createElement("a");
    a.className = "card module-card";
    a.href = m.file;
    a.innerHTML =
      '<span class="mname">' + m.name + '</span>' +
      '<span class="mdesc">' + m.desc + '</span>' +
      '<span class="mmeta">' +
        '<span>Banco: <b>' + m.bank + '</b></span>' +
        '<span>Por partida: <b>' + m.quizLen + '</b></span>' +
        '<span>Temas: <b>' + m.topics + '</b></span>' +
      '</span>';
    grid.appendChild(a);
  });
})();
</script>

<script src="assets/helix.js"></script>
</body>
</html>
